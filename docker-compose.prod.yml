services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: foodini-backend:latest
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend/database.db:/app/backend/database.db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
    image: foodini-frontend:latest
    ports:
      - "5173:5173"
    environment:
      - VITE_GEMINI_API_KEY=${GEMINI_API_KEY}
      - VITE_API_URL=${VITE_API_URL:-https://foodini-api.tylerhoup.dev}
    depends_on:
      - backend
    restart: unless-stopped
